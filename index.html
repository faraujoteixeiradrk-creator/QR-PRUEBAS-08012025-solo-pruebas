<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subir Factura</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --border: #2a2a32;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --text: #e8e8f0;
    --muted: #6b6b80;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 36px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 520px;
  }

  /* ZONA DE ARRASTRAR / SUBIR */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(110,231,183,0.04);
  }
  .drop-zone input {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 2.4rem; margin-bottom: 10px; }
  .drop-zone p { color: var(--muted); font-size: 0.88rem; line-height: 1.6; }
  .drop-zone strong { color: var(--text); }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* SECCIÓN QR */
  .qr-section {
    text-align: center;
  }

  .qr-box {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    margin: 0 auto 12px;
  }

  #qr-img {
    width: 160px;
    height: 160px;
    display: block;
  }

  .qr-label {
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 1.6;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    padding: 6px 14px;
    border-radius: 99px;
    margin-top: 8px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .status-badge.waiting { color: #fbbf24; border-color: #fbbf2440; background: #fbbf2408; }
  .status-badge.received { color: var(--accent); border-color: #6ee7b740; background: #6ee7b708; }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse 1.4s infinite;
  }
  .received .dot { animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* PREVIEW */
  .preview-section {
    margin-top: 24px;
    display: none;
  }
  .preview-section.visible { display: block; }

  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .preview-header span { font-size: 0.85rem; font-weight: 500; }
  .btn-clear {
    background: none; border: none; color: var(--muted);
    font-size: 0.78rem; cursor: pointer; font-family: inherit;
    padding: 4px 8px;
    border-radius: 6px;
    transition: color 0.2s;
  }
  .btn-clear:hover { color: #f87171; }

  #preview-img {
    width: 100%;
    border-radius: 10px;
    border: 1px solid var(--border);
    max-height: 260px;
    object-fit: cover;
  }

  .file-info {
    font-family: 'DM Mono', monospace;
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
  }

  .btn-process {
    margin-top: 16px;
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #0f0f11;
    border: none;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-process:hover { opacity: 0.88; }

  /* PDF preview */
  .pdf-preview {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .pdf-icon { font-size: 2rem; }
  .pdf-name { font-size: 0.86rem; font-weight: 500; }
  .pdf-size { font-size: 0.76rem; color: var(--muted); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 500;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

</style>
</head>
<body>

<h1>📄 Subir Factura</h1>
<p class="subtitle">Desde el ordenador o escanea el QR con el móvil</p>

<div class="card">

  <!-- ZONA DROP ESCRITORIO -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*,.pdf" />
    <div class="drop-icon">📁</div>
    <p><strong>Arrastra tu factura aquí</strong><br>o haz clic para seleccionar<br><span style="font-size:0.78rem">JPG, PNG, PDF</span></p>
  </div>

  <div class="divider">o desde el móvil</div>

  <!-- QR -->
  <div class="qr-section">
    <div class="qr-box">
      <img id="qr-img" src="" alt="QR Code" />
      <div style="color:#111; font-size:0.72rem; font-family:'DM Mono',monospace;" id="session-id-label"></div>
    </div>
    <div class="qr-label">Escanea con la cámara del móvil<br>y sube la foto de la factura</div>
    <div class="status-badge waiting" id="status-badge">
      <span class="dot"></span>
      Esperando imagen del móvil...
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-section" id="previewSection">
    <div class="preview-header">
      <span>✅ Factura cargada</span>
      <button class="btn-clear" onclick="clearFile()">Eliminar</button>
    </div>
    <div id="previewContent"></div>
    <div class="file-info">
      <span id="fileName"></span>
      <span id="fileSize"></span>
    </div>
    <button class="btn-process" onclick="processInvoice()">Procesar factura →</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- QR LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ─────────────────────────────────────────────
// CONFIGURACIÓN: Usamos https://tmpfiles.org como relay gratuito
// El móvil sube el archivo → polling desde el desktop
// ─────────────────────────────────────────────

// Generamos un ID de sesión único
const sessionId = Math.random().toString(36).substr(2, 10).toUpperCase();
document.getElementById('session-id-label').textContent = 'ID: ' + sessionId;

// URL de la página móvil (se genera dinámicamente con el mismo HTML)
// Usamos un servicio de transferencia: filepush.io o simplemente
// una página embebida en el mismo HTML con hash routing

const mobileURL = window.location.href.split('?')[0] + '?mobile=1&session=' + sessionId;

// Generar QR apuntando a la versión móvil
const qrImg = document.getElementById('qr-img');
const qr = new QRCode(document.createElement('div'), {
  text: mobileURL,
  width: 160,
  height: 160,
  colorDark: '#111111',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.M
});
setTimeout(() => {
  const canvas = qr._el.querySelector('canvas');
  if (canvas) qrImg.src = canvas.toDataURL();
}, 100);

// ─────────────────────────────────────────────
// DETECCIÓN: ¿Estamos en la vista MÓVIL?
// ─────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const isMobile = params.get('mobile') === '1';
const mobileSession = params.get('session');

if (isMobile) {
  showMobileView(mobileSession);
}

function showMobileView(session) {
  document.body.innerHTML = `
    <style>
      body { font-family: 'DM Sans', sans-serif; background: #0f0f11; color: #e8e8f0;
             display:flex; flex-direction:column; align-items:center; justify-content:center;
             min-height:100vh; padding:24px; }
      .card { background:#1a1a1f; border:1px solid #2a2a32; border-radius:20px;
              padding:32px; width:100%; max-width:380px; text-align:center; }
      h2 { font-size:1.3rem; margin-bottom:8px; }
      p { color:#6b6b80; font-size:0.88rem; margin-bottom:24px; line-height:1.6; }
      .upload-btn {
        display:block; width:100%; padding:50px 20px;
        border:2px dashed #2a2a32; border-radius:14px;
        cursor:pointer; color:#6b6b80; font-size:0.9rem;
        text-align:center; transition:all 0.2s; margin-bottom:16px;
        background:none;
      }
      .upload-btn:hover { border-color:#6ee7b7; color:#6ee7b7; }
      .upload-btn .icon { font-size:2.5rem; display:block; margin-bottom:8px; }
      input[type=file] { display:none; }
      .progress { display:none; margin-top:16px; }
      .bar { height:6px; background:#2a2a32; border-radius:99px; overflow:hidden; margin:10px 0; }
      .bar-fill { height:100%; background:#6ee7b7; border-radius:99px; width:0; transition:width 0.4s; }
      .msg { font-size:0.85rem; color:#6b6b80; }
      .success { color:#6ee7b7; font-size:1rem; font-weight:600; margin-top:16px; display:none; }
      .btn-cam { background:#6ee7b7; color:#111; border:none; padding:14px 28px;
                 border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer;
                 width:100%; margin-bottom:10px; font-family:inherit; }
      .btn-gal { background:#1a1a1f; color:#e8e8f0; border:1px solid #2a2a32; padding:14px 28px;
                 border-radius:10px; font-size:0.95rem; font-weight:500; cursor:pointer;
                 width:100%; font-family:inherit; }
    </style>
    <div class="card">
      <h2>📄 Subir Factura</h2>
      <p>Sesión: <strong style="color:#818cf8">${session}</strong><br>
         Haz una foto a la factura o selecciónala de la galería</p>
      
      <input type="file" id="mobileFile" accept="image/*,.pdf" capture="environment">
      <input type="file" id="galleryFile" accept="image/*,.pdf">
      
      <button class="btn-cam" onclick="document.getElementById('mobileFile').click()">
        📷 &nbsp;Hacer foto ahora
      </button>
      <button class="btn-gal" onclick="document.getElementById('galleryFile').click()">
        🖼️ &nbsp;Elegir de la galería
      </button>

      <div class="progress" id="progress">
        <div class="bar"><div class="bar-fill" id="barFill"></div></div>
        <div class="msg" id="progressMsg">Subiendo...</div>
      </div>
      <div class="success" id="successMsg">
        ✅ ¡Factura enviada!<br>
        <span style="font-size:0.82rem;color:#6b6b80;font-weight:400">
          Ya puedes volver a tu ordenador
        </span>
      </div>
    </div>
  `;

  function handleFile(file) {
    if (!file) return;
    document.getElementById('progress').style.display = 'block';
    const fill = document.getElementById('barFill');
    const msg = document.getElementById('progressMsg');

    // Subimos a transfer.sh (servicio anónimo gratuito)
    // y guardamos la URL con el sessionId en localStorage del dominio
    const reader = new FileReader();
    reader.onload = function(e) {
      const base64 = e.target.result;
      fill.style.width = '60%';
      msg.textContent = 'Enviando...';

      // Guardamos en sessionStorage usando BroadcastChannel para comunicar entre pestañas
      // Si es mismo dominio/pestaña, usamos localStorage como relay
      const key = 'invoice_session_' + session;
      const data = {
        name: file.name,
        type: file.type,
        size: file.size,
        data: base64,
        timestamp: Date.now()
      };
      
      try {
        localStorage.setItem(key, JSON.stringify(data));
        fill.style.width = '100%';
        msg.textContent = '¡Enviado!';
        document.getElementById('successMsg').style.display = 'block';
      } catch(err) {
        // Si localStorage está lleno, usamos datos más pequeños
        // comprimimos solo metadatos + URL blob
        msg.textContent = 'Error: archivo demasiado grande. Usa PDF o reduce la imagen.';
      }
    };
    reader.readAsDataURL(file);
  }

  document.getElementById('mobileFile').addEventListener('change', e => handleFile(e.target.files[0]));
  document.getElementById('galleryFile').addEventListener('change', e => handleFile(e.target.files[0]));
}

// ─────────────────────────────────────────────
// VISTA DESKTOP: Polling de localStorage
// ─────────────────────────────────────────────
if (!isMobile) {
  const key = 'invoice_session_' + sessionId;
  
  // Limpiamos sesiones antiguas
  for (let k of Object.keys(localStorage)) {
    if (k.startsWith('invoice_session_')) {
      const d = JSON.parse(localStorage.getItem(k) || '{}');
      if (d.timestamp && Date.now() - d.timestamp > 1000 * 60 * 30) {
        localStorage.removeItem(k);
      }
    }
  }

  // Polling cada 2 segundos
  const pollInterval = setInterval(() => {
    const raw = localStorage.getItem(key);
    if (raw) {
      try {
        const fileData = JSON.parse(raw);
        localStorage.removeItem(key);
        clearInterval(pollInterval);
        loadFileFromMobile(fileData);
      } catch(e) {}
    }
  }, 2000);

  // También escucha cambios de storage en tiempo real
  window.addEventListener('storage', (e) => {
    if (e.key === key && e.newValue) {
      try {
        const fileData = JSON.parse(e.newValue);
        localStorage.removeItem(key);
        clearInterval(pollInterval);
        loadFileFromMobile(fileData);
      } catch(e) {}
    }
  });

  function loadFileFromMobile(fileData) {
    // Actualizamos estado
    const badge = document.getElementById('status-badge');
    badge.className = 'status-badge received';
    badge.innerHTML = '<span class="dot"></span> ✅ Factura recibida del móvil';

    showToast('📱 ¡Factura recibida del móvil!');

    // Mostramos preview
    showPreview(fileData.name, fileData.size, fileData.type, fileData.data);
  }
}

// ─────────────────────────────────────────────
// SUBIDA DESDE ESCRITORIO (drag & drop / click)
// ─────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

if (dropZone) {
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) readLocalFile(file);
  });

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) readLocalFile(e.target.files[0]);
  });
}

function readLocalFile(file) {
  const reader = new FileReader();
  reader.onload = e => showPreview(file.name, file.size, file.type, e.target.result);
  reader.readAsDataURL(file);
}

function showPreview(name, size, type, dataUrl) {
  const content = document.getElementById('previewContent');
  document.getElementById('fileName').textContent = name;
  document.getElementById('fileSize').textContent = formatSize(size);

  if (type.startsWith('image/')) {
    content.innerHTML = `<img id="preview-img" src="${dataUrl}" alt="Factura" style="width:100%;border-radius:10px;border:1px solid #2a2a32;max-height:260px;object-fit:cover">`;
  } else {
    content.innerHTML = `
      <div class="pdf-preview">
        <span class="pdf-icon">📄</span>
        <div>
          <div class="pdf-name">${name}</div>
          <div class="pdf-size">${formatSize(size)}</div>
        </div>
      </div>`;
  }

  document.getElementById('previewSection').classList.add('visible');
  
  // Guardamos referencia global para procesar
  window.currentFileData = { name, size, type, dataUrl };
}

function clearFile() {
  document.getElementById('previewSection').classList.remove('visible');
  document.getElementById('previewContent').innerHTML = '';
  window.currentFileData = null;
}

function processInvoice() {
  if (!window.currentFileData) return;
  // ───────────────────────────────────────────
  // AQUÍ conectas con tu lógica de factura
  // Por ejemplo: enviar a tu API, mostrar resultado, etc.
  // ───────────────────────────────────────────
  showToast('🔄 Procesando factura...');
  
  // Ejemplo: después de 1.5s simulamos resultado
  setTimeout(() => {
    showToast('✅ Factura procesada correctamente');
  }, 1500);
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
